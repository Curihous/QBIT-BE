name: Deploy to EC2

on:
  push:
    branches: [ deploy ]
  workflow_dispatch:  

env:
  DOCKER_IMAGE: ${{ secrets.DOCKER_REPO }}
  DOCKER_TAG: ${{ github.sha }}
  CACHE_NAMESPACE: prod-v5  # TODO: 캐시 불호환 변경 시 수정

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Get commit message and version
      id: info
      run: |
        COMMIT_MSG=$(git log -1 --pretty=format:"%s")
        echo "commit_message=$COMMIT_MSG" >> $GITHUB_OUTPUT
        
        API_VERSION=$(grep "version:" qbit-api-app/src/main/resources/application.yml | sed 's/.*version: *//' | sed 's/ *#.*//')
        echo "api_version=$API_VERSION" >> $GITHUB_OUTPUT
        
        REALTIME_VERSION=$(grep "version:" qbit-realtime-app/src/main/resources/application.yml | sed 's/.*version: *//' | sed 's/ *#.*//')
        echo "realtime_version=$REALTIME_VERSION" >> $GITHUB_OUTPUT

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Make gradlew executable
      run: chmod +x ./gradlew

    - name: Set up Buildx
      uses: docker/setup-buildx-action@v3
      with:
        install: true
        driver: docker-container

    - name: Login to DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build & Push API image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        platforms: linux/amd64
        push: true
        tags: ${{ secrets.DOCKER_REPO }}:${{ github.sha }}
        cache-from: type=gha,scope=api
        cache-to: type=gha,mode=max,scope=api

    - name: Build & Push Realtime image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile.realtime
        platforms: linux/amd64
        push: true
        tags: ${{ secrets.DOCKER_REPO_REALTIME }}:${{ github.sha }}
        cache-from: type=gha,scope=realtime
        cache-to: type=gha,mode=max,scope=realtime

    - name: Deploy API to EC2
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.HOST }}
        username: ${{ secrets.USERNAME }}
        key: ${{ secrets.KEY }}
        port: 22
        script: |
          # 0) 공용 네트워크 보장
          docker network inspect qbit-net >/dev/null 2>&1 || docker network create qbit-net

          # 1) Docker Hub 로그인 & 이미지 풀
          echo ${{ secrets.DOCKER_PASSWORD }} | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin
          docker pull ${{ secrets.DOCKER_REPO }}:${{ github.sha }}

          # 2) Redis 컨테이너 관리
          echo "[INFO] Managing Redis container..."
          if docker ps -a --format '{{.Names}}' | grep -qw qbit-redis; then
            # 기존 컨테이너가 포트 바인딩을 가지고 있으면 재생성
            if docker inspect -f '{{json .HostConfig.PortBindings}}' qbit-redis | grep -q '6379/tcp'; then
              echo "[WARN] qbit-redis has host port mapping; recreating without -p"
              DATA_VOL=$(docker inspect -f '{{range .Mounts}}{{if eq .Destination "/data"}}{{.Name}}{{end}}{{end}}' qbit-redis)
              docker rm -f qbit-redis || true
              docker run -d --name qbit-redis \
                --restart unless-stopped \
                --network qbit-net \
                -p 6379:6379 \
                -v ${DATA_VOL:-qbit-redis-data}:/data \
                redis:7-alpine redis-server \
                  --appendonly yes \
                  --requirepass "${{ secrets.REDIS_PASSWORD_PROD }}"
            else
              # 실행 보장 + 네트워크 연결 보장
              docker start qbit-redis 2>/dev/null || true
              docker network connect qbit-net qbit-redis 2>/dev/null || true
            fi
          else
            docker pull redis:7-alpine || true
            docker run -d --name qbit-redis \
              --restart unless-stopped \
              --network qbit-net \
              -p 6379:6379 \
              -v qbit-redis-data:/data \
              redis:7-alpine redis-server \
                --appendonly yes \
                --requirepass "${{ secrets.REDIS_PASSWORD_PROD }}"
          fi

          # 3) API 교체: 같은 네트워크에서 qbit-redis로만 붙기
          docker rm -f qbit-api || true
          docker run -d \
            --name qbit-api \
            --restart unless-stopped \
            --network qbit-net \
            -p 8080:8080 \
            -e SPRING_PROFILES_ACTIVE=prod \
            -e REDIS_HOST_PROD=qbit-redis \
            -e REDIS_PORT_PROD=6379 \
            -e REDIS_PASSWORD_PROD="${{ secrets.REDIS_PASSWORD_PROD }}" \
            -e CACHE_NS=${{ env.CACHE_NAMESPACE }} \
            -e ENCRYPTION_SECRET_KEY="${{ secrets.ENCRYPTION_SECRET_KEY }}" \
            -e DATABASE_URL="${{ secrets.DATABASE_URL }}" \
            -e DATABASE_USERNAME_PROD="${{ secrets.DATABASE_USERNAME_PROD }}" \
            -e DATABASE_PASSWORD_PROD="${{ secrets.DATABASE_PASSWORD_PROD }}" \
            -e JWT_ACCESS_SECRET="${{ secrets.JWT_ACCESS_SECRET }}" \
            -e JWT_REFRESH_SECRET="${{ secrets.JWT_REFRESH_SECRET }}" \
            -e GOOGLE_OAUTH_CLIENT_ID="${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}" \
            -e ALPACA_OAUTH_CLIENT_ID="${{ secrets.ALPACA_OAUTH_CLIENT_ID }}" \
            -e ALPACA_OAUTH_CLIENT_SECRET="${{ secrets.ALPACA_OAUTH_CLIENT_SECRET }}" \
            -e OAUTH_STATE_SECRET="${{ secrets.OAUTH_STATE_SECRET }}" \
          -e STOCK_SYNC_ON="${{ secrets.STOCK_SYNC_ON }}" \
          -e STOCK_SYNC_US_EQUITY="${{ secrets.STOCK_SYNC_US_EQUITY }}" \
          -e STOCK_SYNC_CRYPTO="${{ secrets.STOCK_SYNC_CRYPTO }}" \
          -e MASSIVE_API_KEY="${{ secrets.MASSIVE_API_KEY }}" \
          -e INFO_APP_VERSION="${{ github.sha }}" \
          ${{ secrets.DOCKER_REPO }}:${{ github.sha }}

          # 4) 사용하지 않는 이미지 정리
          docker image prune -f

    - name: Deploy Realtime to EC2
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.HOST_REALTIME }}
        username: ${{ secrets.USERNAME_REALTIME }}
        key: ${{ secrets.KEY_REALTIME }}
        port: 22
        script: |
          set -eux
          echo "[INFO] Pre-clean docker disk (prune)"
          docker ps -aq | xargs -r docker rm -f || true
          docker system prune -af || true
          docker builder prune -af || true
          docker volume prune -f || true
          echo "[INFO] Login to registry"
          echo ${{ secrets.DOCKER_PASSWORD }} | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin

          echo "[INFO] Pull realtime image: ${{ secrets.DOCKER_REPO_REALTIME }}:${{ github.sha }}"
          docker pull ${{ secrets.DOCKER_REPO_REALTIME }}:${{ github.sha }}
          docker images | grep ${{ secrets.DOCKER_REPO_REALTIME }} || true

          echo "[INFO] Replace realtime container"
          docker rm -f qbit-realtime || true
          docker run -d \
            --name qbit-realtime \
            --restart unless-stopped \
            -p 8081:8081 \
            -e SPRING_PROFILES_ACTIVE=prod \
            -e REALTIME_SERVER_PORT_PROD="${{ secrets.REALTIME_SERVER_PORT_PROD }}" \
            -e REDIS_HOST_PROD=${{ secrets.HOST}} \
            -e REDIS_PORT_PROD=6379 \
            -e REDIS_PASSWORD_PROD="${{ secrets.REDIS_PASSWORD_PROD }}" \
          -e ENCRYPTION_SECRET_KEY="${{ secrets.ENCRYPTION_SECRET_KEY }}" \
          -e JWT_ACCESS_SECRET="${{ secrets.JWT_ACCESS_SECRET }}" \
          -e JWT_REFRESH_SECRET="${{ secrets.JWT_REFRESH_SECRET }}" \
          -e MASSIVE_API_KEY="${{ secrets.MASSIVE_API_KEY }}" \
          ${{ secrets.DOCKER_REPO_REALTIME }}:${{ github.sha }}

          echo "[INFO] Show container status and last logs"
          docker ps -a | grep qbit-realtime || true
          docker logs --tail=200 qbit-realtime || true

          echo "[INFO] Prune dangling images"
          docker image prune -f

    - name: Notify deployment status
      if: success() || failure()
      uses: Ilshidur/action-discord@master
      env:
        DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
      with:
          args: |
            **QBIT 백엔드 배포 알림**
            
            **상태:** ${{ job.status == 'success' && '✅ 성공' || '❌ 실패' }}
            **API 버전:** v${{ steps.info.outputs.api_version }}
            **Realtime 버전:** v${{ steps.info.outputs.realtime_version }}
            **브랜치:** ${{ github.ref_name }}
            **커밋 제목:** [${{ steps.info.outputs.commit_message }}](https://github.com/${{ github.repository }}/commit/${{ github.sha }})
            **실행자:** ${{ github.actor }}
