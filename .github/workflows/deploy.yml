name: Deploy to EC2

on:
  push:
    branches: [ deploy ]
  workflow_dispatch:  

env:
  DOCKER_IMAGE: ${{ secrets.DOCKER_REPO }}
  DOCKER_TAG: ${{ github.sha }}
  CACHE_NAMESPACE: prod-v1  # TODO: 캐시 불호환 변경 시 수정

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Make gradlew executable
      run: chmod +x ./gradlew

    - name: Set up Buildx
      uses: docker/setup-buildx-action@v3
      with:
        install: true
        driver: docker-container

    - name: Login to DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build & Push image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        platforms: linux/amd64
        push: true
        tags: ${{ secrets.DOCKER_REPO }}:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Deploy to EC2
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.HOST }}
        username: ${{ secrets.USERNAME }}
        key: ${{ secrets.KEY }}
        port: 22
        script: |
          # 0) 공용 네트워크 보장
          docker network inspect qbit-net >/dev/null 2>&1 || docker network create qbit-net

          # 1) Docker Hub 로그인 & 이미지 풀
          echo ${{ secrets.DOCKER_PASSWORD }} | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin
          docker pull ${{ secrets.DOCKER_REPO }}:${{ github.sha }}

          # 2) Redis 컨테이너 관리(재사용), 포트 바인딩 없음
          echo "[INFO] Managing Redis container..."
          if docker ps -a --format '{{.Names}}' | grep -qw qbit-redis; then
            if [ "$(docker inspect -f '{{.State.Running}}' qbit-redis)" != "true" ]; then
              docker start qbit-redis
            else
              echo "[INFO] Redis already running"
            fi
          else
            docker pull redis:7-alpine || true
            docker run -d --name qbit-redis \
              --restart unless-stopped \
              --network qbit-net \
              -v qbit-redis-data:/data \
              redis:7-alpine redis-server \
                --appendonly yes \
                --requirepass "${{ secrets.REDIS_PASSWORD_PROD }}"
          fi

          # 2-2) Redis 헬스체크
          echo "[INFO] Waiting for Redis to be ready..."
          for i in $(seq 1 60); do
            if docker exec qbit-redis sh -c 'redis-cli -a "$REDIS_PASS" ping 2>/dev/null || redis-cli ping' \
              --env REDIS_PASS="${{ secrets.REDIS_PASSWORD_PROD }}" | grep -q PONG; then
              echo "[INFO] Redis is ready"
              break
            fi
            sleep 0.5
            if [ $i -eq 60 ]; then
              echo "[ERROR] Redis not responding"
              docker logs qbit-redis || true
              exit 1
            fi
          done

          # 3) API 교체: 같은 네트워크에서 qbit-redis로만 붙기
          docker rm -f qbit-api || true
          docker run -d \
            --name qbit-api \
            --restart unless-stopped \
            --network qbit-net \
            -p 8080:8080 \
            -e SPRING_PROFILES_ACTIVE=prod \
            -e REDIS_HOST_PROD=qbit-redis \
            -e REDIS_PORT_PROD=6379 \
            -e REDIS_PASSWORD_PROD="${{ secrets.REDIS_PASSWORD_PROD }}" \
            -e CACHE_NS=${{ env.CACHE_NAMESPACE }} \
            -e ENCRYPTION_SECRET_KEY="${{ secrets.ENCRYPTION_SECRET_KEY }}" \
            -e DATABASE_URL="${{ secrets.DATABASE_URL }}" \
            -e DATABASE_USERNAME_PROD="${{ secrets.DATABASE_USERNAME_PROD }}" \
            -e DATABASE_PASSWORD_PROD="${{ secrets.DATABASE_PASSWORD_PROD }}" \
            -e JWT_ACCESS_SECRET="${{ secrets.JWT_ACCESS_SECRET }}" \
            -e JWT_REFRESH_SECRET="${{ secrets.JWT_REFRESH_SECRET }}" \
            -e KAKAO_CLIENT_ID="${{ secrets.KAKAO_CLIENT_ID }}" \
            -e KAKAO_CLIENT_SECRET="${{ secrets.KAKAO_CLIENT_SECRET }}" \
            -e ALPACA_OAUTH_CLIENT_ID="${{ secrets.ALPACA_OAUTH_CLIENT_ID }}" \
            -e ALPACA_OAUTH_CLIENT_SECRET="${{ secrets.ALPACA_OAUTH_CLIENT_SECRET }}" \
            -e OAUTH_STATE_SECRET="${{ secrets.OAUTH_STATE_SECRET }}" \
            -e ALPACA_OAUTH_REDIRECT_URI="${{ secrets.ALPACA_OAUTH_REDIRECT_URI }}" \
            -e INFO_APP_VERSION="${{ github.sha }}" \
            ${{ secrets.DOCKER_REPO }}:${{ github.sha }}

          # 4) API 컨테이너 시작 확인
          echo "[INFO] Waiting for API container..."
          sleep 8
          if ! docker ps --format '{{.Names}}' | grep -q '^qbit-api$'; then
            echo "[ERROR] API container failed to start"
            docker logs qbit-api 2>/dev/null || true
            exit 1
          fi
          echo "[INFO] API container is up"

          # 5) 사용하지 않는 이미지 정리
          docker image prune -f


    - name: Get commit message and version
      id: info
      run: |
        COMMIT_MSG=$(git log -1 --pretty=format:"%s")
        echo "commit_message=$COMMIT_MSG" >> $GITHUB_OUTPUT
        
        VERSION=$(grep "version:" qbit-api-app/src/main/resources/application.yml | sed 's/.*version: *//' | sed 's/ *#.*//')
        echo "version=$VERSION" >> $GITHUB_OUTPUT

    - name: Notify deployment status
      if: always()
      uses: Ilshidur/action-discord@master
      env:
        DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
      with:
          args: |
            **QBIT 백엔드 배포 알림**
            
            **상태:** ${{ job.status == 'success' && '✅ 성공' || '❌ 실패' }}
            **버전:** v${{ steps.info.outputs.version }}
            **브랜치:** ${{ github.ref_name }}
            **커밋 제목:** [${{ steps.info.outputs.commit_message }}](https://github.com/${{ github.repository }}/commit/${{ github.sha }})
            **실행자:** ${{ github.actor }}
