spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/qbit_dev
    username: ${DB_USERNAME_DEV}
    password: ${DB_PASSWORD_DEV}
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO_DEV}
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  
  data:
    redis:
      host: ${REDIS_HOST_DEV}
      port: ${REDIS_PORT_DEV}
      password: ${REDIS_PASSWORD_DEV}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

  # OAuth2
  security:
    oauth2:
      client:
        registration:
          kakao:
            client-id: ${KAKAO_CLIENT_ID}
            client-secret: ${KAKAO_CLIENT_SECRET}
            redirect-uri: http://localhost:8080/login/oauth2/code/kakao
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            client-name: kakao-login
            scope: # kakao 개인 정보 동의 항목 설정의 ID 값
              - profile_nickname
              - account_email
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

# JWT 
jwt:
  secret:
    access: ${JWT_ACCESS_SECRET_DEV}
    refresh: ${JWT_REFRESH_SECRET_DEV}

# Alpaca OAuth
alpaca:
  oauth:
    client-id: ${ALPACA_OAUTH_CLIENT_ID}
    client-secret: ${ALPACA_OAUTH_CLIENT_SECRET}
    redirect-uri: http://localhost:8080/api/oauth/alpaca/callback
    authorization-url: https://app.alpaca.markets/oauth/authorize
    token-url: https://api.alpaca.markets/oauth/token
  paper-trading:
    base-url: https://paper-api.alpaca.markets
    
logging:
  level:
    com.curihous.qbit: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG
    org.springframework.data.redis: DEBUG
    org.springframework.security: DEBUG
    com.curihous.qbit.alpaca: DEBUG
    feign: DEBUG

# App Info
info:
  app:
    name: QBIT Backend
    version: 1.1.0

# Swagger
springdoc:
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
  api-docs:
    enabled: true
    path: /api-docs
    info:
      title: ${info.app.name} API
      version: ${info.app.version}
      description: ${info.app.description}